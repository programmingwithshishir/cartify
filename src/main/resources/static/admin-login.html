<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartify — Admin Login</title>
  <meta name="description" content="Admin portal login for Cartify.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="card">
    <div style="text-align:center; margin-bottom:20px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6c63ff,#5046e4);margin-bottom:8px;box-shadow:0 8px 24px rgba(108,99,255,0.4);">
        <span style="font-size:1.4rem;">⚙️</span>
      </div>
      <div style="font-size:0.78rem;font-weight:600;color:#64748b;letter-spacing:0.1em;text-transform:uppercase;">Admin Portal</div>
    </div>
    <h1>Admin Login</h1>
    <p style="margin-bottom:4px;">Restricted access — administrators only.</p>

    <form id="adminForm">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter admin username" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter admin password" required>

      <button type="submit" id="adminSubmitBtn" style="background:linear-gradient(135deg,#f97316,#ea580c);">Login as Admin</button>
      <div id="message" class="message"></div>
    </form>

    <div class="links">
      Customer? <a href="/login.html">Customer Login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("adminForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.textContent = "";
      message.className = "message";

      const payload = {
        email: document.getElementById("username").value,
        password: document.getElementById("password").value
      };

      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      message.textContent = data.message || "Request finished.";
      message.classList.add(res.ok ? "ok" : "err");

      if (res.ok) {
        window.location.href = "/admin/dashboard";
      }
    });
  </script>
</body>
</html>
